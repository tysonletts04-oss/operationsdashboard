name: Refresh dashboard data

# Regenerates data.json from DataSights every morning and commits it back.
# Committing data.json is what triggers the static host (Vercel / GitHub Pages /
# Azure Static Web Apps) to redeploy — so the dashboard refreshes itself.

on:
  schedule:
    - cron: "0 20 * * *"      # 20:00 UTC = 06:00 AEST — before the venues open
  workflow_dispatch: {}         # allow a manual run from the Actions tab

permissions:
  contents: write               # needed to commit data.json back to the repo

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild data.json from DataSights
        env:
          # Provide ONE of these as a repo secret and implement datasights_query()
          # in build_data.py to use it (see that file's docstring).
          DATASIGHTS_API_URL: ${{ secrets.DATASIGHTS_API_URL }}
          DATASIGHTS_API_KEY: ${{ secrets.DATASIGHTS_API_KEY }}
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          # Live refresh. If a validation gate fails, build_data.py exits non-zero
          # and data.json is left untouched — the board keeps its last good copy.
          python build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "yochi-data-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "data.json unchanged — nothing to commit."
          else
            git add data.json
            git commit -m "chore: refresh dashboard data ($(date -u +%Y-%m-%d))"
            git push
          fi
